# ──────────────────────────────────────────────────────────────────
# Anti-Fraud Platform · docker-compose
#
# 基础服务: mysql / redis / minio / backend / frontend
# 可选 profile: edge(Nginx HTTPS 统一入口) / observability(Prometheus+Grafana)
# 全部带 healthcheck + depends_on: condition: service_healthy
# 冷启动目标 ≤ 60s
# ──────────────────────────────────────────────────────────────────

name: anti-fraud

services:
  # ── 数据库 ───────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: anti-fraud-mysql
    restart: unless-stopped
    env_file: ./infra/.env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-anti_fraud}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${MYSQL_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-apppassword}
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
      --sql-mode="STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks: [appnet]

  # ── Redis：Session + 缓存 + Pub/Sub + Stream ───────────────────
  redis:
    image: redis:7.2-alpine
    container_name: anti-fraud-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-redispassword}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [appnet]

  # ── MinIO：本地 S3，存证据文件 ─────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: anti-fraud-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [appnet]

  # ── 后端 ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: anti-fraud-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: ${APP_ENV:-local}
      PYTHONPATH: /app 
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-app_user}:${MYSQL_PASSWORD:-apppassword}@mysql:3306/${MYSQL_DATABASE:-anti_fraud}?charset=utf8mb4
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379/0
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      S3_BUCKET: ${S3_BUCKET:-evidence}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app:cached
      - backend_cache:/root/.cache
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks: [appnet]

  # ── 可选统一入口：Nginx TLS 终止 + 反向代理 ─────────────────────
  edge:
    image: nginx:1.27
    container_name: anti-fraud-edge
    profiles: ["edge"]
    restart: unless-stopped
    depends_on:
      backend: { condition: service_healthy }
      frontend: { condition: service_started }
    ports:
      - "${EDGE_HTTP_PORT:-8080}:80"
      - "${EDGE_HTTPS_PORT:-8443}:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/proxy-common.conf:/etc/nginx/conf.d/proxy-common.conf:ro
      - edge_certs:/etc/nginx/certs
    command: >
      /bin/sh -c "if [ ! -f /etc/nginx/certs/dev.crt ]; then openssl req -x509 -nodes -newkey rsa:2048 -days 365 -keyout /etc/nginx/certs/dev.key -out /etc/nginx/certs/dev.crt -subj '/CN=localhost'; fi; nginx -g 'daemon off;'"
    networks: [appnet]

  # ── 可选可观测性：Prometheus + Grafana ─────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: anti-fraud-prometheus
    profiles: ["observability"]
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      backend: { condition: service_healthy }
    networks: [appnet]

  grafana:
    image: grafana/grafana:11.3.1
    container_name: anti-fraud-grafana
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      prometheus: { condition: service_started }
    networks: [appnet]

  # ── 前端 ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: anti-fraud-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    depends_on:
      backend: { condition: service_healthy }
    networks: [appnet]

networks:
  appnet:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  minio_data:
  backend_cache:
  edge_certs:
  prometheus_data:
  grafana_data:
