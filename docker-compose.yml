# ──────────────────────────────────────────────────────────────────
# Anti-Fraud Platform · docker-compose
#
# 5 个服务: mysql / redis / minio / backend / frontend
# 全部带 healthcheck + depends_on: condition: service_healthy
# 冷启动目标 ≤ 60s
# ──────────────────────────────────────────────────────────────────

name: anti-fraud

services:
  # ── 数据库 ───────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: anti-fraud-mysql
    restart: unless-stopped
    env_file: ./infra/.env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-anti_fraud}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${MYSQL_USER:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-apppassword}
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
      --sql-mode="STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks: [appnet]

  # ── Redis：Session + 缓存 + Pub/Sub + Stream ───────────────────
  redis:
    image: redis:7.2-alpine
    container_name: anti-fraud-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-redispassword}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [appnet]

  # ── MinIO：本地 S3，存证据文件 ─────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: anti-fraud-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [appnet]

  # ── 后端 ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: anti-fraud-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-app_user}:${MYSQL_PASSWORD:-apppassword}@mysql:3306/${MYSQL_DATABASE:-anti_fraud}?charset=utf8mb4
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app:cached
      - backend_cache:/root/.cache
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks: [appnet]

  # ── 前端 ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: anti-fraud-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    depends_on:
      backend: { condition: service_healthy }
    networks: [appnet]

networks:
  appnet:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  minio_data:
  backend_cache:
