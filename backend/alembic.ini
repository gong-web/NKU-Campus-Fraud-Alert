[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
timezone = UTC

# Migration naming: <date>_<revision>_<slug>.py
# Keep this file ASCII-only because Alembic reads it with the Windows locale.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# DATABASE_URL is injected by env.py at runtime; keep this blank to avoid secrets.
sqlalchemy.url =

[post_write_hooks]
hooks = black, ruff
black.type = console_scripts
black.entrypoint = black
black.options = -l 100 REVISION_SCRIPT_FILENAME
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
