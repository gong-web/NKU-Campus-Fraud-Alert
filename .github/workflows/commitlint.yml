name: commitlint

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]

jobs:
  lint-pr-title:
    name: Validate PR title (Conventional Commits)
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            PR 标题不应以大写字母开头。请使用 Conventional Commits，
            例如：feat(auth): 接入 Mock CAS provider
