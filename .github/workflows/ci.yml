name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# 取消同一 PR 上的旧 CI
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── 后端 lint + 测试 ────────────────────────────────────────────
  backend:
    name: backend
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: anti_fraud_test
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -prootpassword"
          --health-interval=5s --health-timeout=3s --health-retries=10
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping" --health-interval=5s
          --health-timeout=3s --health-retries=5

    defaults:
      run:
        working-directory: ./backend

    env:
      APP_ENV: test
      DATABASE_URL: mysql+aiomysql://root:rootpassword@127.0.0.1:3306/anti_fraud_test?charset=utf8mb4
      REDIS_URL: redis://127.0.0.1:6379/0
      SECRET_KEY: ci-test-secret-key-do-not-use-in-prod
      AUTH_PROVIDER: mock
      KMS_PROVIDER: local
      KMS_LOCAL_MASTER_KEY: dGVzdC1tYXN0ZXIta2V5LWZvci1jaS1vbmx5LTMyLWJ5dGVzIQ==

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Format check (Black)
        run: uv run black --check .

      - name: Type check (Mypy)
        run: uv run mypy app

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Test (pytest with coverage)
        run: uv run pytest -ra --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend
        continue-on-error: true

  # ── 前端 lint + 测试 ────────────────────────────────────────────
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test (Vitest)
        run: npm run test -- --run --coverage

      - name: Build
        run: npm run build

  # ── 安全扫描 ──────────────────────────────────────────────────────
  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit & bandit
        run: pip install pip-audit bandit

      - name: pip-audit (backend deps)
        working-directory: ./backend
        run: |
          pip install -e .
          pip-audit -s osv --strict || echo "audit reported issues, see above"
        continue-on-error: true

      - name: Bandit (backend code)
        working-directory: ./backend
        run: bandit -r app -lll -q
        continue-on-error: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: npm audit (frontend)
        working-directory: ./frontend
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  # ── 镜像构建 ──────────────────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: runtime
          push: false
          load: true
          tags: anti-fraud/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runtime
          push: false
          load: true
          tags: anti-fraud/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (backend)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: anti-fraud/backend:ci
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true
        continue-on-error: true
